-point\">根据客户来源入口判定结果推优房，房源需通过房源交流会、片区优房筛选获取，且经纪人需提前联系房源维护人，确认价格等最新信息后再推荐</div>\n                    </div>\n                </div>\n                \n                <div class=\"section-block\">\n                    <div class=\"section-title\">\n                        <i class=\"fas fa-comments\"></i>\n                        查看聊天记录并指导\n                    </div>\n                    <div class=\"section-content\">\n                        <div class=\"bullet-point\">后台查阅经纪人与客户的聊天记录，针对沟通方式、需求挖掘、回应逻辑等方面给予个性化建议</div>\n                    </div>\n                </div>\n                \n                <div class=\"section-block\">\n                    <div class=\"section-title\">\n                        <i class=\"fas fa-sync-alt\"></i>\n                        持续复聊\n                    </div>\n                    <div class=\"section-content\">\n                        <div class=\"bullet-point\">客户成交周期长，只要客户未拉黑，经纪人需<span class=\"highlight-text\">持续与客户保持沟通</span>，确保客源不流失</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"zh-CN\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>IM转委托示例</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');\n        \n        body {\n            margin: 0;\n            padding: 0;\n            font-family: 'Noto Sans SC', sans-serif;\n            overflow: hidden;\n        }\n        \n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            position: relative;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            overflow: hidden;\n        }\n        \n        .content-wrapper {\n            width: 100%;\n            height: 100%;\n cle-1 {\n            width: 300px;\n            height: 300px;\n            background: #ffffff;\n            top: -100px;\n            right: -100px;\n        }\n        \n        .deco-circle-2 {\n            width: 200px;\n            height: 200px;\n            background: #ffffff;\n            bottom: -50px;\n            left: -50px;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"slide-container\">\n        <div class=\"deco-circle deco-circle-1\"></div>\n        <div class=\"deco-circle deco-circle-2\"></div>\n        \n        <div class=\"content-wrapper\">\n            <h1 class=\"title\">店长的深度参与&amp;业务制衡策略</h1>\n            \n            <div class=\"cards-container\">\n                <!-- 卡片1: 深度参与业务 -->\n                <div class=\"card\">\n                    <div class=\"card-header\">\n                        <div class=\"card-icon\">\n                            <i class=\"fas fa-users\"></i>\n                        </div>\n                        <div class=\"card-title\">深度参与业务</div>\n                    </div>\n                    <div class=\"card-content\">\n                        从<span class=\"highlight\">IM聊天、复聊、带看、斡旋</span>全流程跟进，从而掌握一手客户信息，为后续服务和销售策略提供依据。与经纪人共同制定关键客户服务策略，提高成交效率和客户满意度。\n                    </div>\n                </div>\n                \n                <!-- 卡片2: 业务&数据赋能 -->\n                <div class=\"card\">\n                    <div class=\"card-header\">\n                        <div class=\"card-icon\">\n                            <i class=\"fas fa-chart-line\"></i>\n                        </div>\n                        <div class=\"card-title\">业务&amp;数据赋能</div>\n                    </div>\n                    <div class=\"card-content\">\n                        整理市场数据，包括<span class=\"highlight\">成交量、价格、周期</span>等，将这些信息作为\"谈资\"和数据支撑，为经纪人与客户、业主沟通时提供有力的证据和专业说服力。\n                    </div>\n                </div>\n                \n                <!-- 卡片3: 重点带教扶持 -->\n                <div class=\"card\">\n                    <div class=\"card-header\">\n                        <div class=\"card-icon\">\n                            <i class=\"fas fa-hands-helping\"></i>\n                        </div>\n                        <div class=\"card-title\">重点带教扶持</div>\n                    </div>\n                    <div class=\"card-content\">\n                        每月店长应有策略地集中精力扶持<span class=\"highlight\">1-2位经纪人</span>，通过深度参与和指导，帮助他们突破业绩瓶颈，从而带动整个店面业绩的\"制衡式增长\"，避免资源过度集中于少数人。\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"zh-CN\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>为什么店东要参与陪看</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');\n        \n        body {\n            margin: 0;\n            padding: 0;\n            font-family: 'Noto Sans SC', sans-serif;\n            overflow: hidden;\n        }\n        \n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            position: relative;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            overflow: hidden;\n        }\n        \n        .content-wrapper {\n            width: 100%;\n            height: 100%;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            position: relative;\n            z-index: 2;\n        }\n        \n        .icon-container {\n            margin-bottom: 60px;\n            animation: float 3s ease-in-out infinite;\n        }\n        \n        .icon-container img {\n            width: 280px;\n            height: 280px;\n            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));\n        }\n        \n        .title {\n            font-size: 68px;\n            font-weight: 700;\n            color: #ffffff;\n            text-align: center;\n            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);\n            letter-spacing: 2px;\n            line-height: 1.3;\n            padding: 0 80px;\n        }\n        \n        .question-mark {\n            display: inline-block;\n            color: #ffd700;\n            font-size: 80px;\n            margin-left: 10px;\n            animation: pulse 2s ease-in-out infinite;\n        }\n        \n        .decorative-line {\n            width: 120px;\n            height: 6px;\n            background: linear-gradient(90deg, transparent, #ffffff, transparent);\n            margin: 40px auto 0;\n            border-radius: 3px;\n        }\n        \n        .background-pattern {\n            position: absolute;\n            width: 100%;\n            height: 100%;\n            top: 0;\n            left: 0;\n            opacity: 0.1;\n            z-index: 1;\n        }\n        \n        .circle {\n            position: absolute;\n            border-radius: 50%;\n            background: rgba(255, 255, 255, 0.1);\n        }\n        \n        .circle-1 {\n            width: 400px;\n            height: 400px;\n            top: -100px;\n            right: -100px;\n            animation: float-slow 8s ease-in-out infinite;\n        }\n        \n        .circle-2 {\n            width: 300px;\n            height: 300px;\n            bottom: -80px;\n            left: -80px;\n            animation: float-slow 10s ease-in-out infinite reverse;\n        }\n        \n        .circle-3 {\n            width: 200px;\n            height: 200px;\n            top: 50%;\n            left: 10%;\n            animation: float-slow 12s ease-in-out infinite;\n        }\n        \n        @keyframes float {\n            0%, 100% {\n                transform: translateY(0px);\n            }\n            50% {\n                transform: translateY(-20px);\n            }\n        }\n        \n        @keyframes float-slow {\n            0%, 100% {\n                transform: translate(0, 0);\n            }\n            50% {\n                transform: translate(20px, 20px);\n            }\n        }\n        \n        @keyframes pulse {\n            0%, 100% {\n                opacity: 1;\n                transform: scale(1);\n            }\n            50% {\n                opacity: 0.8;\n                transform: scale(1.1);\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"slide-container\">\n        <!-- 背景装饰 -->\n        <div class=\"background-pattern\">\n            <div class=\"circle circle-1\"></div>\n            <div class=\"circle circle-2\"></div>\n            <div class=\"circle circle-3\"></div>\n        </div>\n        \n        <!-- 主内容 -->\n        <div class=\"content-wrapper\">\n            <div class=\"icon-container\">\n                <img src=\"assets/a8c29d59e73b.png\" alt=\"图标\">\n            </div>\n            \n            <h1 class=\"title\">\n                为什么店东要参与陪看<span class=\"question-mark\">?</span>\n            </h1>\n            \n            <div class=\"decorative-line\"></div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"zh-CN\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>深度参与业务-带看陪看</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link rel=\"stylesheet\" href=\"assets/a08e56a46b79.css\">\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');\n        \n        body, html {\n            margin: 0;\n            padding: 0;\n            width: 100%;\n            height: 100%;\n            overflow: hidden;\n            font-family: 'Noto Sans SC', sans-serif;\n        }\n        \n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            position: relative;\n            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);\n            overflow: hidden;\n        }\n        \n        .background-pattern {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            opacity: 0.05;\n            background-image: \n                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.03) 35px, rgba(255,255,255,.03) 70px);\n        }\n        \n        .content-wrapper {\n            position: relative;\n            z-index: 1;\n            width: 100%;\n            height: 100%;\n            padding: 60px 80px;\n            box-sizing: border-box;\n        }\n        \n        .title {\n            font-size: 42px;\n            font-weight: 700;\n            color: #ffffff;\n            margin-bottom: 50px;\n            text-align: left;\n            letter-spacing: 2px;\n        }\n        \n        .subtitle {\n            font-size: 20px;\n            color: #4fc3f7;\n            margin-bottom: 35px;\n            font-weight: 500;\n        }\n        \n        .content-grid {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 25px;\n            margin-bottom: 30px;\n        }\n        \n        .content-section {\n            background: rgba(255, 255, 255, 0.08);\n            border-radius: 12px;\n            padding: 20px 24px;\n            border-left: 4px solid #4fc3f7;\n            backdrop-filter: blur(10px);\n        }\n        \n        .section-title {\n            font-size: 18px;\n            font-weight: 600;\n            color: #4fc3f7;\n            margin-bottom: 12px;\n            display: flex;\n            align-items: center;\n            gap: 10px;\n        }\n        \n        .section-content {\n            font-size: 15px;\n            color: #e0e0e0;\n            line-height: 1.7;\n        }\n        \n        .highlight-box {\n            background: rgba(79, 195, 247, 0.15);\n            border-radius: 10px;\n            padding: 18px 22px;\n            margin-top: 25px;\n            border: 1px solid rgba(79, 195, 247, 0.3);\n        }\n        \n        .highlight-title {\n            font-size: 19px;\n            font-weight: 600;\n            color: #4fc3f7;\n            margin-bottom: 14px;\n        }\n        \n        .highlight-list {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 12px;\n        }\n        \n        .highlight-item {\n            font-size: 14px;\n            color: #e0e0e0;\n            line-height: 1.6;\n            padding-left: 20px;\n            position: relative;\n        }\n        \n        .highlight-item:before {\n            content: \"▸\";\n            position: absolute;\n            left: 0;\n            color: #4fc3f7;\n            font-weight: bold;\n        }\n        \n        .icon-circle {\n            width: 24px;\n            height: 24px;\n            border-radius: 50%;\n            background: rgba(79, 195, 247, 0.2);\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 12px;\n            color: #4fc3f7;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"slide-container\">\n        <div class=\"background-pattern\"></div>\n        \n        <div class=\"content-wrapper\">\n            <h1 class=\"title\">深度参与业务-带看陪看</h1>\n            \n            <p class=\"subtitle\">了解客户需求和反馈，掌握一手客户信息，同时通过带看辅导帮助经纪人提升客户维护能力</p>\n            \n            <div class=\"content-grid\">\n                <div class=\"content-section\">\n                    <div class=\"section-title\">\n                        <div class=\"icon-circle\"><i class=\"fas fa-clipboard-check\"></i></div>\n                        <span>带看前准备协助</span>\n                    </div>\n                    <div class=\"section-content\">\n                        协助经纪人完成带看前期筹备工作，包括房源梳理、新房项目报备、钥匙准备、相关资料打印等\n                    </div>\n                </div>\n                \n                <div class=\"content-section\">\n                    <div class=\"section-title\">\n                        <div class=\"icon-circle\"><i class=\"fas fa-search-location\"></i></div>\n                        <span>经纪人提前实地考察</span>\n                    </div>\n                    <div class=\"section-content\">\n                        带看前1天，经纪人需实地查看房源，同步完成带看路线设计、房源详细情况了解、提前通风等工作\n                    </div>\n                </div>\n                \n                <div class=\"content-section\">\n                    <div class=\"section-title\">\n                        <div class=\"icon-circle\"><i class=\"fas fa-users\"></i></div>\n                        <span>带看中分工配合</span>\n                    </div>\n                    <div class=\"section-content\">\n                        带看过程中，以经纪人为主进行房源介绍，店东负责补充说明遗漏信息，形成协同配合\n                    </div>\n                </div>\n                \n                <div class=\"content-section\">\n                    <div class=\"section-title\">\n                        <div class=\"icon-circle\"><i class=\"fas fa-chart-line\"></i></div>\n                        <span>带看后复盘总结</span>\n                    </div>\n                    <div class=\"section-content\">\n                        带看结束后，组织经纪人回店，共同复盘本次带看的整体情况，梳理问题与优化方向\n                    </div>\n                </div>\n            </div>\n            \n            <div class=\"highlight-box\">\n                <div class=\"highlight-title\">经纪人带看需提升</div>\n                <div class=\"highlight-list\">\n                    <div class=\"highlight-item\">优化沟通方式：避免经纪人单向输出过多，引导其多向客户提问</div>\n                    <div class=\"highlight-item\">强化房源储备：要求经纪人熟悉周边房源情况，快速提供替代房源</div>\n                    <div class=\"highlight-item\">提升专业底气：鼓励经纪人基于专业判断大胆给客户合理建议</div>\n                    <div class=\"highlight-item\">珍惜带看机会：尽可能安排符合需求的房源带看，提升客户粘合度</div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"zh-CN\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>深度参与业务-陪看目的</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link rel=\"stylesheet\" href=\"assets/a08e56a46b79.css\">\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');\n        \n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n        \n        body {\n            font-family: 'Noto Sans SC', sans-serif;\n            overflow: hidden;\n        }\n        \n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);\n            position: relative;\n            overflow: hidden;\n        }\n        \n        .bg-pattern {\n            position: absolute;\n            width: 100%;\n            height: 100%;\n            opacity: 0.03;\n            background-image: \n                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.05) 35px, rgba(255,255,255,.05) 70px);\n        }\n        \n        .content-wrapper {\n            position: relative;\n            z-index: 1;\n            width: 100%;\n            height: 100%;\n            padding: 60px 80px;\n            display: flex;\n            flex-direction: column;\n        }\n        \n        .title {\n            font-size: 42px;\n            font-weight: 700;\n            color: #ffffff;\n            margin-bottom: 80px;\n            text-align: center;\n            letter-spacing: 2px;\n        }\n        \n        .concept-diagram {\n            flex: 1;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            position: relative;\n        }\n        \n        .center-node {\n            position: relative;\n            z-index: 10;\n        }\n        \n        .center-circle {\n            width: 180px;\n            height: 180px;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            border-radius: 50%;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);\n            border: 4px solid rgba(255, 255, 255, 0.2);\n        }\n        \n        .center-icon {\n            font-size: 48px;\n            color: #ffffff;\n            margin-bottom: 8px;\n        }\n        \n        .center-text {\n            font-size: 32px;\n            font-weight: 700;\n            color: #ffffff;\n            letter-spacing: 3px;\n        }\n        \n        .outer-nodes {\n            position: absolute;\n            width: 100%;\n            height: 100%;\n            top: 0;\n            left: 0;\n        }\n        \n        .node {\n            position: absolute;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            gap: 16px;\n        }\n        \n        .node-top {\n            top: 0;\n            left: 50%;\n            transform: translateX(-50%);\n        }\n        \n        .node-left {\n            left: 50px;\n            top: 50%;\n            transform: translateY(-50%);\n        }\n        \n        .node-right {\n            right: 50px;\n            top: 50%;\n            transform: translateY(-50%);\n        }\n        \n        .node-circle {\n            width: 140px;\n            height: 140px;\n            background: rgba(255, 255, 255, 0.08);\n            border: 3px solid rgba(255, 255, 255, 0.2);\n            border-radius: 50%;\n            display: flex;\n            flex-direct         var iframe = document.getElementById('slideFrame');
        var total = SLIDES.length;
        var current = 0;
        var WIDTH = 1280;
        var HEIGHT = 720;

        function fitScale() {
          if (!iframe) return;
          var scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
          iframe.style.transform = 'scale(' + scale + ')';
          iframe.style.transformOrigin = 'center center';
        }

        function show(index) {
          if (index < 0 || index >= total) return;
          current = index;
          iframe.srcdoc = SLIDES[current];
          fitScale();
        }

        function enterFullscreen() {
          var el = document.documentElement;
          (el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
        }

        function exitFullscreen() {
          var doc = document;
          (doc.exitFullscreen || doc.webkitExitFullscreen || doc.webkitCancelFullScreen || doc.mozCancelFullScreen || doc.msExitFullscreen).call(doc);
        }

        function showFullscreenHint() {
          trigger.classList.remove('ready');
        }

        function hideFullscreenHint() {
          trigger.classList.add('ready');
        }

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            exitFullscreen();
            return;
          }
          var trigger = document.getElementById('fullscreenTrigger');
          if (!trigger.classList.contains('ready')) return;
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) show(current - 1); e.preventDefault(); }
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) show(current + 1); e.preventDefault(); }
        });

        function onFullscreenChange() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
          if (isFs) hideFullscreenHint();
          else showFullscreenHint();
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        document.addEventListener('mozfullscreenchange', onFullscreenChange);
        document.addEventListener('MSFullscreenChange', onFullscreenChange);

        var trigger = document.getElementById('fullscreenTrigger');
        var overlay = document.getElementById('fullscreenOverlay');
        overlay.addEventListener('click', function(e) {
          if (trigger.classList.contains('ready')) {
            var mid = window.innerWidth / 2;
            if (e.clientX < mid) { if (current > 0) show(current - 1); }
            else { if (current < total - 1) show(current + 1); }
          } else if (e.target === trigger || trigger.contains(e.target)) {
            enterFullscreen();
          }
        });

        window.addEventListener('resize', fitScale);

        show(0);
      })();
